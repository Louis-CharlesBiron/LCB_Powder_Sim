<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./examples/images/logo.png" type="image/x-icon">
  <title>LCB Powder Simulation</title>
  <link rel="stylesheet" href="./examples/index.css">
</head>
  <body>

    <div class="main">
      <div class="cvsParent">
        <canvas id="simulationCanvas"></canvas>
      </div>

      <div class="controls">
        <div class="left">
          <div class="buttons">
            <button id="startButton">Start</button>
            <button id="stopButton">Stop</button>
            <button id="backStepButton"><</button>
            <button id="stepButton">></button>
            <button id="clearButton">Clear</button>
          </div>

          <div class="settings">
            <input id="widthInput" type="number" step="1" min="1" max="1920" placeholder="Width...">
            <input id="heightInput" type="number" step="1" min="1" max="1080" placeholder="Height...">
            <input id="pixelSizeInput" type="number" step="1" min="1" max="200" placeholder="Pixel size...">
            <select id="brushTypeOptions"></select>
            <select id="materialOptions"></select>
          </div>
        </div>

        <div class="saveParent">
          <div>
            <button id="saveButton">Save</button>
            <button id="loadButton">Load</button>
          </div>

          <div>
            <input id="exportValueInput" type="text" placeholder="Save export to copy..." readonly>
            <input id="loadValueInput" type="text" placeholder="Load to input...">
          </div>
        </div>

      </div>
    </div>

    <div class="status">
      <div><span id="fpsDisplay"></span><span id="fpsStepDisplay"></span></div>
      <span id="mousePosStatus"></span>
      <span id="mapDimensionsStatus"></span>
      <span id="selectedMaterialStatus"></span>
      <span id="brushTypeStatus"></span>
      <span id="mouseMaterialStatus"></span>
      <span id="sidePriorityStatus"></span>
      <span id="isRunningStatus"></span>
      <span id="physicsUnitTypeStatus"></span>
      <span id="timeStampStatus"></span>
      <span id="zoomStatus"></span>
      <div id="particleStatus"></div>
    </div>

    <script src="./examples/coi-serviceworker.min.js"></script>

    <script src="./src/engine/canvasDotEffect.js"></script>
    <script src="./src/models/CameraManager.js"></script>
    <script src="./src/utils/SimUtils.js"></script>
    <script src="./src/models/KeybindManager.js"></script>
    <script src="./src/config/settings.js"></script>
    <script src="./src/config/colorSettings.js"></script>
    <script src="./src/config/userSettings.js"></script>
    <script src="./src/config/worldStartSettings.js"></script>
    <script src="./src/config/physicsSettings.js"></script>
    <script src="./src/config/MaterialsSettings.js"></script>
    <script src="./src/config/defaultKeybinds.js"></script>
    <script src="./src/physics/PhysicsUtils.js"></script>
    <script src="./src/physics/MaterialsBehavior.js"></script>
    <script src="./src/physics/PhysicsCore.js"></script>
    <script src="./src/physics/units/_PhysicsUnit.js"></script>
    <script src="./src/physics/units/LocalPhysicsUnit.js"></script>
    <script src="./src/physics/units/RemotePhysicsUnit.js"></script>
    <script src="./src/models/MapGrid.js"></script>
    <script src="./src/models/Simulation.js"></script>

    <!-- <script src="deployements/codeBuilds/umd/lcbPS.min.js"></script> -->
    <!-- <script src="deployements/codeBuilds/umd/raw/lcbPS.js"></script> -->
    <!-- <script type="module" src="deployements/codeBuilds/esm/raw/lcb-ps.js"></script>-->
    <!-- <script type="module" src="deployements/codeBuilds/esm/raw/lcb-ps.js"></script> -->

    <script src="./examples/utils.js"></script>
    <script src="./examples/index.js"></script>
  </body>
</html>
